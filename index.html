<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#05050f" />
  <title>HELIX — The Galaxy</title>
  <meta name="description" content="The creative galaxy of Helix — film, coding, fashion, painting and photography, explored as a journey through space." />
  <link rel="icon" href="images/helix-placeholder.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/galaxy.css" />
  <link rel="stylesheet" href="css/intro.css" />
</head>
<body>

  <!-- ============ WARP-IN INTRO (full on arrival, quick on returns) ============ -->
  <div id="intro" class="intro">
    <canvas id="warp-canvas" class="warp-canvas"></canvas>
    <button id="skip-intro" class="skip-intro" type="button">Skip&nbsp;&#9656;</button>
  </div>

  <!-- ============ THE GALAXY ============ -->
  <main id="galaxy" class="galaxy" aria-hidden="true">
    <!-- animated starfield sits behind everything -->
    <canvas id="star-canvas" class="star-canvas"></canvas>

    <!-- live-viewer ships are drawn onto this layer -->
    <div id="ship-layer" class="ship-layer" aria-hidden="true"></div>

    <!-- a few of these background "stars" are secretly clickable -->
    <div id="secret-layer" class="secret-layer" aria-hidden="true"></div>

    <!-- the nebula worlds; injected here by galaxy.js -->
    <div id="nebula-layer" class="nebula-layer"></div>

    <!-- Helix, the galaxy's anchor -->
    <div class="helix" id="helix">
      <img src="images/helix-placeholder.svg" alt="Helix" class="helix-img" />
      <span class="helix-word">HELIX</span>
    </div>

    <!-- The Hitchhiker's Guide entry point -->
    <a href="blog/index.html" class="guide-link" title="The Hitchhiker's Guide to the Galaxy">
      <span class="guide-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <!-- an open journal with a guiding star -->
          <path d="M12 6.5 C 10 4.8, 6.5 4.6, 4 5.6 L 4 18.4 C 6.5 17.4, 10 17.6, 12 19.2 C 14 17.6, 17.5 17.4, 20 18.4 L 20 5.6 C 17.5 4.6, 14 4.8, 12 6.5 Z" />
          <line x1="12" y1="6.5" x2="12" y2="19.2" />
          <path d="M16 8.6 l0.55 1.15 1.25 0.16 -0.92 0.87 0.24 1.24 -1.12 -0.6 -1.12 0.6 0.24 -1.24 -0.92 -0.87 1.25 -0.16 Z" fill="currentColor" stroke="none" />
        </svg>
      </span>
      <span class="guide-text">The Guide</span>
    </a>

    <!-- live viewer count -->
    <div class="presence-readout" id="presence-readout" title="Travellers exploring right now">
      <span class="presence-dot"></span>
      <span id="presence-count">1</span> exploring now
    </div>

    <header class="galaxy-intro-text">
      <h1>HELIX</h1>
      <p>A galaxy of creative endeavours. Choose a world to explore.</p>
    </header>
  </main>

  <!-- data + scripts (deferred; order matters: data first) -->
  <script src="data/planets.js" defer></script>
  <script src="js/stars.js" defer></script>
  <script src="js/galaxy.js" defer></script>
  <script src="js/intro.js" defer></script>
  <script src="js/secret.js" defer></script>
  <!-- presence.js loads the Supabase library by itself, and only
       once real keys have been added (demo mode needs nothing) -->
  <script src="js/presence.js" defer></script>
</body>
</html>
