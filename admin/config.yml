# =====================================================================
# Decap CMS configuration — controls the /admin editor.
# This tells the editor WHERE posts live and WHAT fields they have.
# =====================================================================

backend:
  name: git-gateway      # uses Netlify Identity + Git Gateway to save to GitHub
  branch: main           # commits go to the main branch -> Netlify redeploys

# Where uploaded images are stored in the repo, and how the site links to them.
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "The Hitchhiker's Guide (Blog)"
    description: "Write and publish journal entries here."
    files:
      - name: "posts"
        label: "Blog posts"
        file: "content/posts.json"
        format: "json"
        fields:
          - name: "posts"
            label: "Posts"
            label_singular: "Post"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { name: "title", label: "Title", widget: "string" }
              - {
                  name: "date",
                  label: "Date",
                  widget: "datetime",
                  date_format: "YYYY-MM-DD",
                  time_format: false,
                  format: "YYYY-MM-DD",
                }
              - { name: "excerpt", label: "Short excerpt (one line shown in the list)", widget: "string", required: false }
              - { name: "cover", label: "Cover image (optional)", widget: "image", required: false }
              - { name: "body", label: "Body", widget: "markdown" }
