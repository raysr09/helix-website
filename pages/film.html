<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Film — HELIX</title>
  <meta name="description" content="Film work by Helix — pick a reel, roll the projector." />
  <link rel="icon" href="../images/helix-placeholder.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/worlds.css" />
</head>
<body class="world world-film scene">
  <a href="../index.html" class="return-link">&#9666;&nbsp; Return to the Galaxy</a>

  <header class="scene-title">
    <p class="world-kicker">INT. SCREENING ROOM &mdash; NIGHT</p>
    <h1>FILM</h1>
  </header>

  <div class="cinema">
    <!-- the big screen -->
    <div class="screen">
      <span class="screen-msg">PICK A REEL TO BEGIN</span>
    </div>

    <!-- the projector beam -->
    <div class="beam" aria-hidden="true"></div>

    <!-- the old projector, in silhouette -->
    <div class="projector" aria-hidden="true">
      <span class="proj-reel proj-reel-a"></span>
      <span class="proj-reel proj-reel-b"></span>
      <span class="proj-body"></span>
      <span class="proj-lens"></span>
      <span class="proj-leg proj-leg-a"></span>
      <span class="proj-leg proj-leg-b"></span>
    </div>

    <!-- the reels on the shelf: each one is a film -->
    <nav class="reel-shelf" aria-label="Films">
      <a class="scene-item reel" href="work.html?from=film&amp;title=Untitled%20Short">
        <span class="reel-disc" aria-hidden="true"></span>
        <span class="reel-label">REEL 01 &mdash; UNTITLED SHORT</span>
      </a>
      <a class="scene-item reel" href="work.html?from=film&amp;title=Experiment%20No.%201">
        <span class="reel-disc" aria-hidden="true"></span>
        <span class="reel-label">REEL 02 &mdash; EXPERIMENT NO. 1</span>
      </a>
      <a class="scene-item reel" href="work.html?from=film&amp;title=Coming%20Soon">
        <span class="reel-disc" aria-hidden="true"></span>
        <span class="reel-label">REEL 03 &mdash; IN PRODUCTION</span>
      </a>
    </nav>
  </div>

  <script src="../js/worlds.js" defer></script>
</body>
</html>
