<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f12" />
  <title>Coding — HELIX</title>
  <meta name="description" content="Coding projects by Helix — a live terminal. Type help to begin." />
  <link rel="icon" href="../images/helix-placeholder.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/worlds.css" />
</head>
<body class="world world-coding scene">
  <a href="../index.html" class="return-link">cd ../galaxy</a>

  <div class="terminal" id="terminal">
    <div class="term-bar">
      <span class="term-dots" aria-hidden="true"></span>
      <span class="term-title">helix@galaxy: ~/coding</span>
    </div>

    <div class="term-screen" id="term-screen" role="log" aria-label="Terminal">
      <div id="term-out"></div>
      <div class="term-input-line" id="term-input-line" hidden>
        <span class="term-prompt">helix@galaxy:~/coding$&nbsp;</span><span id="term-typed"></span><span class="term-caret" aria-hidden="true"></span>
      </div>
    </div>

    <div class="term-hints" id="term-hints" aria-label="Command shortcuts">
      <button type="button" data-cmd="help">help</button>
      <button type="button" data-cmd="ls">ls</button>
      <button type="button" data-cmd="open helix-website">open helix-website</button>
      <button type="button" data-cmd="galaxy">galaxy</button>
    </div>
  </div>

  <!-- offscreen input so phone keyboards can type into the terminal -->
  <input id="term-real-input" class="term-real-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-hidden="true" tabindex="-1" />

  <script src="../js/terminal.js" defer></script>
</body>
</html>
