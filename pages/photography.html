<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#110708" />
  <title>Photography — HELIX</title>
  <meta name="description" content="Photography by Helix — prints hanging on the darkroom board." />
  <link rel="icon" href="../images/helix-placeholder.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body class="world world-photography scene">
  <a href="../index.html" class="return-link">&#9666;&nbsp; Return to the Galaxy</a>

  <header class="scene-title">
    <p class="world-kicker">Darkroom &mdash; safelight on</p>
    <h1>PHOTOGRAPHY</h1>
  </header>

  <div class="board">
    <a class="scene-item polaroid" style="--x:14%; --y:26%; --r:-5deg"
       href="work.html?from=photography&amp;title=Series%20I">
      <span class="clip" aria-hidden="true"></span>
      <span class="photo" aria-hidden="true"></span>
      <span class="chin">SERIES I &mdash; EXP 400</span>
    </a>

    <a class="scene-item polaroid" style="--x:38%; --y:48%; --r:3deg"
       href="work.html?from=photography&amp;title=Single%20Frame">
      <span class="clip" aria-hidden="true"></span>
      <span class="photo photo-b" aria-hidden="true"></span>
      <span class="chin">SINGLE FRAME &mdash; 1:1.4</span>
    </a>

    <a class="scene-item polaroid" style="--x:63%; --y:22%; --r:6deg"
       href="work.html?from=photography&amp;title=Night%20Walks">
      <span class="clip" aria-hidden="true"></span>
      <span class="photo photo-c" aria-hidden="true"></span>
      <span class="chin">NIGHT WALKS &mdash; PUSH +2</span>
    </a>

    <a class="scene-item polaroid" style="--x:80%; --y:56%; --r:-4deg"
       href="work.html?from=photography&amp;title=Coming%20Soon">
      <span class="clip" aria-hidden="true"></span>
      <span class="photo photo-dark" aria-hidden="true"></span>
      <span class="chin">UNDEVELOPED</span>
    </a>

    <!-- a strip of negatives, also a work -->
    <a class="scene-item filmstrip" style="--x:32%; --y:14%; --r:8deg"
       href="work.html?from=photography&amp;title=Contact%20Sheet">
      <span class="fs-frame" aria-hidden="true"></span>
      <span class="fs-frame" aria-hidden="true"></span>
      <span class="fs-frame" aria-hidden="true"></span>
    </a>
  </div>

  <script src="../js/worlds.js" defer></script>
</body>
</html>
